<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Patients — TatvaCare</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="app" id="app">
    <main class="main">
      <div class="topbar">
        <div class="crumbs"><a href="/dashboard">Dashboard</a> / <strong>Patients</strong></div>
      </div>
      <div class="content">
        <div class="card">
          <div class="card-header">
            <div><div class="card-title">My patients</div><div class="card-subtitle" id="count">Loading…</div></div>
            <a href="/dashboard/prescribe" class="btn">+ New Rx</a>
          </div>
          <input id="search" class="form-input" placeholder="Search by name, phone, ABHA number..." style="margin-bottom:16px" />
          <div id="list"><div class="skeleton text" style="height:200px"></div></div>
        </div>
      </div>
    </main>
  </div>
  <script src="/static/app.js"></script>
  <script>
    (async () => {
      await TatvaCare.initPage('patients');
      async function load(q) {
        const list = document.getElementById('list');
        list.innerHTML = '<div class="skeleton text" style="height:100px"></div>';
        const { patients } = await TatvaCare.API.get('/api/patients' + (q ? '?q=' + encodeURIComponent(q) : ''));
        document.getElementById('count').textContent = patients.length + ' patient' + (patients.length !== 1 ? 's' : '');
        if (patients.length === 0) {
          list.innerHTML = '<div class="empty"><div class="icon">👥</div><div class="title">No patients found</div><div class="desc">' + (q ? 'Try a different search' : 'Patients appear after their first appointment or Rx') + '</div></div>';
          return;
        }
        list.innerHTML = '<div class="table-wrap"><table><thead><tr><th>Name</th><th>ABHA</th><th>Phone</th><th>Gender</th><th>City</th><th>Last visit</th><th>Rx</th><th></th></tr></thead><tbody>' +
          patients.map(p => `<tr>
            <td><a href="/dashboard/patient/${TatvaCare.escapeHtml(p.patient_id)}" style="font-weight:600"><strong>${TatvaCare.escapeHtml(p.full_name)}</strong></a></td>
            <td><code style="font-size:0.8rem">${TatvaCare.escapeHtml(p.abha_number || '—')}</code></td>
            <td>${TatvaCare.escapeHtml(p.phone)}</td>
            <td>${TatvaCare.escapeHtml(p.gender || '—')}</td>
            <td>${TatvaCare.escapeHtml(p.city || '—')}</td>
            <td>${TatvaCare.fmtDate(p.last_visit)}</td>
            <td><span class="badge info">${p.rx_count || 0}</span></td>
            <td style="text-align:right"><a class="btn btn-sm btn-secondary" href="/dashboard/patient/${TatvaCare.escapeHtml(p.patient_id)}">Open</a> <a class="btn btn-sm" href="/dashboard/prescribe/${TatvaCare.escapeHtml(p.patient_id)}">+ Rx</a></td>
          </tr>`).join('') + '</tbody></table></div>';
      }
      let timer;
      document.getElementById('search').addEventListener('input', (e) => { clearTimeout(timer); timer = setTimeout(() => load(e.target.value), 200); });
      load('');
    })();
  </script>
</body>
</html>

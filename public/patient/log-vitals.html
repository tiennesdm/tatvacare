<!doctype html>
<html lang="hi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#6366f1" />
  <link rel="manifest" href="/static/manifest.json" />
  <title>रीडिंग दर्ज करें · तत्वकेयर</title>
  <link rel="stylesheet" href="/static/style.css" />
  <style>
    body { background: #f9fafb; }
    .log-header { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: white; padding: 16px 20px; }
    .log-header h1 { margin: 0; font-size: 20px; }
    .log-card {
      max-width: 500px; margin: 16px auto; padding: 16px;
      background: white; border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    }
    .metric-tabs {
      display: flex; overflow-x: auto; gap: 6px; padding-bottom: 12px;
      margin-bottom: 12px; border-bottom: 1px solid var(--border);
    }
    .metric-tab {
      padding: 8px 14px; border-radius: 16px; background: #f3f4f6;
      font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap;
    }
    .metric-tab.active { background: var(--primary); color: white; }
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 13px; margin-bottom: 4px; color: var(--text-secondary); }
    .field input, .field textarea, .field select {
      width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px;
      font-size: 16px; font-family: inherit; box-sizing: border-box;
    }
    .field input:focus { outline: none; border-color: var(--primary); }
    .field-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
    }
    .field-grid .field-row {
      background: #f9fafb; padding: 10px 12px;
      border: 1px solid var(--border); border-radius: 10px;
    }
    .field-grid .field-row label {
      font-size: 12px; color: var(--text-secondary); font-weight: 600;
      display: block; margin-bottom: 4px;
    }
    .field-grid .field-row .with-unit {
      display: flex; align-items: center; gap: 6px;
    }
    .field-grid .field-row input {
      flex: 1; min-width: 0; padding: 8px 10px; border: none;
      background: white; border-radius: 6px; font-size: 18px; font-weight: 700;
    }
    .field-grid .field-row .unit {
      font-size: 11px; color: var(--text-secondary); min-width: 28px;
    }
    .field-grid .field-row input:focus { outline: 2px solid var(--primary); outline-offset: -2px; }
    @media (max-width: 380px) { .field-grid { grid-template-columns: 1fr; } }
    .status-msg { padding: 12px; border-radius: 8px; margin-top: 12px; font-size: 14px; }
    .status-msg.ok { background: #d1fae5; color: #065f46; }
    .status-msg.warn { background: #fef3c7; color: #92400e; }
    .status-msg.err { background: #fee2e2; color: #991b1b; }
    .recent-section { max-width: 500px; margin: 16px auto; }
    .recent-list { background: white; border-radius: 12px; padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
    .recent-row { padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  </style>
</head>
<body>
  <div class="log-header">
    <div style="display:flex;align-items:center;gap:12px;">
      <a href="/patient/home" style="color:white;text-decoration:none;font-size:20px;">←</a>
      <h1>रीडिंग दर्ज करें</h1>
    </div>
  </div>
  <div class="log-card">
    <div style="font-size:13px;color:var(--text-secondary);margin-bottom:12px;">
      एक बार में कई रीडिंग दर्ज करें — केवल जो आपने मापी हैं भरें, बाकी खाली छोड़ दें।
    </div>

    <form id="log-form">
      <div class="field-grid">
        <div class="field-row">
          <label>रक्तचाप (ऊपरी) · systolic</label>
          <div class="with-unit"><input type="number" name="systolic" data-metric="systolic" data-unit="mmHg" step="1" inputmode="decimal" placeholder="—" /><span class="unit">mmHg</span></div>
        </div>
        <div class="field-row">
          <label>रक्तचाप (नीचे) · diastolic</label>
          <div class="with-unit"><input type="number" name="diastolic" data-metric="diastolic" data-unit="mmHg" step="1" inputmode="decimal" placeholder="—" /><span class="unit">mmHg</span></div>
        </div>
        <div class="field-row">
          <label>नाड़ी · pulse</label>
          <div class="with-unit"><input type="number" name="pulse" data-metric="pulse" data-unit="bpm" step="1" inputmode="decimal" placeholder="—" /><span class="unit">bpm</span></div>
        </div>
        <div class="field-row">
          <label>खाली पेट शुगर · fasting</label>
          <div class="with-unit"><input type="number" name="glucose_fasting" data-metric="glucose_fasting" data-unit="mg/dL" step="1" inputmode="decimal" placeholder="—" /><span class="unit">mg/dL</span></div>
        </div>
        <div class="field-row">
          <label>भोजन के बाद शुगर · pp</label>
          <div class="with-unit"><input type="number" name="glucose_pp" data-metric="glucose_pp" data-unit="mg/dL" step="1" inputmode="decimal" placeholder="—" /><span class="unit">mg/dL</span></div>
        </div>
        <div class="field-row">
          <label>वज़न · weight</label>
          <div class="with-unit"><input type="number" name="weight_kg" data-metric="weight_kg" data-unit="kg" step="0.1" inputmode="decimal" placeholder="—" /><span class="unit">kg</span></div>
        </div>
        <div class="field-row">
          <label>तापमान · temperature</label>
          <div class="with-unit"><input type="number" name="temp_c" data-metric="temp_c" data-unit="°C" step="0.1" inputmode="decimal" placeholder="—" /><span class="unit">°C</span></div>
        </div>
        <div class="field-row">
          <label>SpO2 · oxygen</label>
          <div class="with-unit"><input type="number" name="spo2" data-metric="spo2" data-unit="%" step="1" inputmode="decimal" placeholder="—" /><span class="unit">%</span></div>
        </div>
      </div>

      <div class="field" style="margin-top:18px;">
        <label>नोट (वैकल्पिक)</label>
        <textarea name="notes" id="notes" rows="2" placeholder="जैसे: सुबह की दवाई के बाद"></textarea>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;padding:14px;font-size:16px;">💾 सहेजें</button>
      <div id="status"></div>
    </form>
  </div>

  <div class="recent-section">
    <h3 style="padding:0 4px;">📈 हाल की रीडिंग्स</h3>
    <div class="recent-list" id="recent-list">लोड हो रहा है...</div>
  </div>

  <script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('/static/sw.js').catch(() => {});
    const METRICS = {
      systolic: { label: 'रक्तचाप (ऊपरी)', unit: 'mmHg' },
      diastolic: { label: 'रक्तचाप (नीचे)', unit: 'mmHg' },
      pulse: { label: 'नाड़ी', unit: 'bpm' },
      glucose_fasting: { label: 'खाली पेट शुगर', unit: 'mg/dL' },
      glucose_pp: { label: 'भोजन के बाद शुगर', unit: 'mg/dL' },
      weight_kg: { label: 'वज़न', unit: 'kg' },
      temp_c: { label: 'तापमान', unit: '°C' },
      spo2: { label: 'SpO2', unit: '%' },
    };
    document.getElementById('log-form').onsubmit = async (e) => {
      e.preventDefault();
      const notes = document.getElementById('notes').value;
      // Build a readings[] array from every non-empty input that has a
      // data-metric attribute. Patients usually measure BP + glucose +
      // weight all in one morning session, so the form is now a single
      // submit covering all 8 metrics instead of tab-switching.
      const readings = Array.from(document.querySelectorAll('input[data-metric]'))
        .map(el => ({
          metric: el.dataset.metric,
          value: el.value.trim(),
          unit: el.dataset.unit,
          notes,
        }))
        .filter(r => r.value !== '');
      if (readings.length === 0) {
        document.getElementById('status').innerHTML = '<div class="status-msg warn">कम से कम एक रीडिंग भरें</div>';
        return;
      }
      try {
        const r = await fetch('/api/patient/vitals', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ readings }),
        });
        const j = await r.json();
        if (!r.ok) throw new Error(j.error?.message || 'failed');
        const saved = j.readings || [j];
        const flagged = saved.filter(x => x.flagged).length;
        const msg = flagged > 0
          ? `<div class="status-msg warn">⚠️ ${saved.length} रीडिंग सहेजी गईं — ${flagged} सामान्य सीमा से बाहर। कृपया डॉक्टर से संपर्क करें।</div>`
          : `<div class="status-msg ok">✅ ${saved.length} रीडिंग${saved.length === 1 ? '' : 'ें'} सफलतापूर्वक सहेजी गई${saved.length === 1 ? '!' : 'ईं!'}</div>`;
        document.getElementById('status').innerHTML = msg;
        // Clear all metric inputs but keep notes for follow-up entries.
        document.querySelectorAll('input[data-metric]').forEach(el => { el.value = ''; });
        loadRecent();
      } catch (err) {
        document.getElementById('status').innerHTML = '<div class="status-msg err">त्रुटि: ' + err.message + '</div>';
      }
    };
    async function loadRecent() {
      const r = await fetch('/api/patient/vitals');
      const j = await r.json();
      const list = document.getElementById('recent-list');
      if (!j.vitals?.length) { list.innerHTML = '<div style="color:var(--text-secondary);">कोई रीडिंग नहीं</div>'; return; }
      list.innerHTML = j.vitals.slice(0, 20).map(v =>
        `<div class="recent-row">
          <div style="display:flex;justify-content:space-between;">
            <span><strong>${METRICS[v.metric]?.label || v.metric}:</strong> ${v.value}${v.unit ? ' ' + v.unit : ''}</span>
            <span style="color:var(--text-secondary);font-size:12px;">${new Date(v.recorded_at).toLocaleString('hi-IN')}</span>
          </div>
          ${v.flagged ? `<span style="color:#991b1b;font-size:11px;">⚠️ ${v.flagged === 'high' ? 'ऊँचा' : 'कम'}</span>` : ''}
          ${v.notes ? `<div style="color:var(--text-secondary);font-size:12px;">${v.notes}</div>` : ''}
        </div>`).join('');
    }
    loadRecent();
  </script>
</body>
</html>

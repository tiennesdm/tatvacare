<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign in — TatvaCare</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body style="background: var(--slate-50); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px">
  <div style="max-width: 440px; width: 100%">
    <div style="text-align: center; margin-bottom: 24px">
      <a href="/" class="brand" style="color: var(--brand-600); font-weight: 700; font-size: 1.25rem; text-decoration: none">TatvaCare</a>
    </div>
    <div class="card" style="padding: 32px">
      <h2 style="margin-bottom: 8px">Sign in</h2>
      <p class="muted" style="margin-bottom: 24px">Use your phone or email.</p>
      <form id="login-form">
        <div class="form-group">
          <label class="form-label">Phone or email</label>
          <input name="phoneOrEmail" class="form-input" required placeholder="+919876500001 or you@clinic.com" />
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input name="password" type="password" class="form-input" required />
        </div>
        <button type="submit" class="btn btn-block btn-lg">Sign in</button>
      </form>
      <div style="text-align: center; margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border); font-size: 0.875rem">
        <span class="muted">New to TatvaCare?</span> <a href="/signup" style="font-weight: 500">Create an account</a>
      </div>
      <div class="alert info" style="margin-top: 20px; font-size: 0.8rem">
        <div class="alert-icon">ℹ️</div>
        <div class="alert-content">
          <div class="alert-title">Demo accounts</div>
          <div style="font-family: var(--font-mono); font-size: 0.75rem; line-height: 1.6">
            +919876500001 / tatva123<br>
            +919876500002 / tatva123<br>
            +919876500003 / tatva123
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="/static/app.js"></script>
  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      const btn = e.target.querySelector('button[type=submit]');
      btn.disabled = true; btn.textContent = 'Signing in...';
      try {
        const { doctor } = await TatvaCare.API.post('/api/auth/login', Object.fromEntries(fd.entries()));
        TatvaCare.showToast('Welcome ' + doctor.full_name, 'success');
        setTimeout(() => window.location.href = '/dashboard', 500);
      } catch (err) {
        TatvaCare.showToast(err.message, 'error');
        btn.disabled = false; btn.textContent = 'Sign in';
      }
    });
  </script>
</body>
</html>

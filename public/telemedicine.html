<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tele-health · TatvaCare</title>
  <link rel="stylesheet" href="/static/style.css" />
  <style>
    body { background: #0f172a; color: white; min-height: 100vh; }
    .tele-container { max-width: 1100px; margin: 0 auto; padding: 16px; }
    .tele-header { display: flex; justify-content: space-between; align-items: center; padding: 8px 0 16px; }
    .video-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
    .video-tile {
      background: #1e293b; border-radius: 12px; aspect-ratio: 16/9;
      position: relative; overflow: hidden; display: flex;
      align-items: center; justify-content: center;
    }
    .video-tile video { width: 100%; height: 100%; object-fit: cover; }
    .video-tile .placeholder { color: #94a3b8; font-size: 14px; text-align: center; }
    .video-tile .label {
      position: absolute; top: 8px; left: 8px;
      background: rgba(0,0,0,0.5); padding: 4px 10px;
      border-radius: 8px; font-size: 12px;
    }
    .controls {
      display: flex; gap: 12px; justify-content: center;
      padding: 16px; background: #1e293b; border-radius: 12px; margin-bottom: 16px;
    }
    .ctl-btn {
      width: 56px; height: 56px; border-radius: 50%; border: none;
      background: #334155; color: white; cursor: pointer; font-size: 22px;
    }
    .ctl-btn.end { background: #ef4444; }
    .chat-panel { background: #1e293b; border-radius: 12px; padding: 12px; height: 280px; display: flex; flex-direction: column; }
    .chat-msgs { flex: 1; overflow-y: auto; margin-bottom: 8px; }
    .chat-msg { padding: 6px 10px; margin: 4px 0; border-radius: 8px; max-width: 70%; font-size: 13px; }
    .chat-msg.doctor { background: #6366f1; color: white; margin-left: auto; }
    .chat-msg.patient { background: #334155; color: white; }
    .chat-input { display: flex; gap: 8px; }
    .chat-input input { flex: 1; padding: 8px; border-radius: 8px; border: 1px solid #475569; background: #0f172a; color: white; }
    .chat-input button { padding: 8px 16px; border-radius: 8px; background: #6366f1; color: white; border: none; cursor: pointer; }
    .session-list-card { background: #1e293b; padding: 16px; border-radius: 12px; margin-bottom: 12px; }
  </style>
</head>
<body>
  <div class="tele-container">
    <div class="tele-header">
      <a href="/dashboard" style="color:white;text-decoration:none;font-size:20px;">←</a>
      <h1 style="margin:0;font-size:22px;">📞 Tele-health Console</h1>
      <div id="conn-status" style="font-size:12px;color:#94a3b8;">IDLE</div>
    </div>

    <div class="session-list-card">
      <h3 style="margin-top:0;">📅 Scheduled Sessions</h3>
      <div id="sessions-list">Loading…</div>
    </div>

    <div id="call-screen" style="display:none;">
      <div class="video-grid">
        <div class="video-tile">
          <video id="local-video" autoplay muted playsinline></video>
          <div class="placeholder" id="local-placeholder">📹 आप (Doctor)</div>
          <div class="label">You (Doctor)</div>
        </div>
        <div class="video-tile">
          <video id="remote-video" autoplay playsinline></video>
          <div class="placeholder" id="remote-placeholder">👤 रोगी (Patient)</div>
          <div class="label">Patient</div>
        </div>
      </div>
      <div class="controls">
        <button class="ctl-btn" id="mute-btn">🎤</button>
        <button class="ctl-btn" id="cam-btn">📹</button>
        <button class="ctl-btn end" id="end-btn">📞</button>
      </div>
      <div class="chat-panel">
        <div class="chat-msgs" id="chat-msgs">
          <div style="text-align:center;color:#94a3b8;font-size:12px;">Type messages during the call</div>
        </div>
        <div class="chat-input">
          <input type="text" id="chat-input" placeholder="Type message…" />
          <button id="chat-send">Send</button>
        </div>
      </div>
      <div style="margin-top:16px;display:flex;gap:8px;justify-content:center;">
        <a id="rx-link" href="#" style="background:#6366f1;color:white;padding:10px 20px;border-radius:8px;text-decoration:none;">📝 Start Rx for patient</a>
      </div>
    </div>
  </div>

  <script>
    let localStream = null, pc = null, isMuted = false, isCamOff = false;
    let currentSession = null;

    async function loadSessions() {
      const r = await fetch('/api/telemedicine/sessions');
      const j = await r.json();
      const list = document.getElementById('sessions-list');
      if (!j.sessions?.length) { list.innerHTML = '<div style="color:#94a3b8;">कोई scheduled session नहीं</div>'; return; }
      list.innerHTML = j.sessions.map(s => `
        <div style="padding:10px 0;border-bottom:1px solid #334155;display:flex;align-items:center;gap:12px;">
          <div style="flex:1;">
            <strong>${escapeHtml(s.patient_id)}</strong>
            <div style="font-size:12px;color:#94a3b8;">📅 ${formatTs(s.scheduled_at)} · ${s.channel || 'webrtc'} · ${s.status}</div>
          </div>
          ${s.status === 'scheduled' || s.status === 'active'
            ? `<button class="ctl-btn" style="width:auto;padding:8px 16px;border-radius:8px;" onclick="joinCall('${s.session_id}', '${s.patient_id}')">Join</button>`
            : `<span style="color:#94a3b8;font-size:12px;">${s.status}</span>`}
        </div>
      `).join('');
    }

    async function joinCall(sessionId, patientId) {
      currentSession = sessionId;
      document.getElementById('call-screen').style.display = 'block';
      document.getElementById('rx-link').href = '/dashboard/prescribe?patient_id=' + patientId;
      // Tell backend session is active
      await fetch('/api/telemedicine/sessions/' + sessionId + '/start', { method: 'POST' });
      try {
        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        document.getElementById('local-video').srcObject = localStream;
        document.getElementById('local-placeholder').style.display = 'none';
        document.getElementById('conn-status').textContent = 'CONNECTED';
      } catch (e) {
        document.getElementById('conn-status').textContent = 'PERM DENIED';
      }
    }

    document.getElementById('mute-btn').onclick = () => {
      if (!localStream) return;
      isMuted = !isMuted;
      localStream.getAudioTracks().forEach(t => t.enabled = !isMuted);
      document.getElementById('mute-btn').textContent = isMuted ? '🔇' : '🎤';
    };
    document.getElementById('cam-btn').onclick = () => {
      if (!localStream) return;
      isCamOff = !isCamOff;
      localStream.getVideoTracks().forEach(t => t.enabled = !isCamOff);
      document.getElementById('cam-btn').textContent = isCamOff ? '🎬' : '📹';
    };
    document.getElementById('end-btn').onclick = async () => {
      if (localStream) localStream.getTracks().forEach(t => t.stop());
      if (pc) pc.close();
      document.getElementById('conn-status').textContent = 'ENDED';
      document.getElementById('call-screen').style.display = 'none';
      if (currentSession) {
        await fetch('/api/telemedicine/sessions/' + currentSession + '/end', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ notes: 'Doctor ended call.' }),
        });
      }
    };

    function addChatMsg(body, kind) {
      const c = document.getElementById('chat-msgs');
      const div = document.createElement('div');
      div.className = 'chat-msg ' + kind;
      div.textContent = body;
      c.appendChild(div);
      c.scrollTop = c.scrollHeight;
    }

    document.getElementById('chat-send').onclick = async () => {
      const i = document.getElementById('chat-input');
      const body = i.value.trim();
      if (!body || !currentSession) return;
      i.value = '';
      addChatMsg(body, 'doctor');
      try {
        await fetch('/api/telemedicine/sessions/' + currentSession + '/messages', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ body }),
        });
      } catch {}
    };
    document.getElementById('chat-input').onkeypress = (e) => {
      if (e.key === 'Enter') document.getElementById('chat-send').click();
    };

    function escapeHtml(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
    function formatTs(s) { if (!s) return '—'; try { return new Date(s).toLocaleString(); } catch { return s; } }

    loadSessions();
    setInterval(loadSessions, 30000);
  </script>
</body>
</html>

# TatvaCare CI — lint, test, security audit, build.
#
# Stages (each stage runs only after the previous succeeds):
#   1. lint      — Node + Python syntax + import smoke
#   2. test      — run all .mjs tests under tests/ (Vedadb mock optional)
#   3. security  — npm audit (high+) + Python safety check
#   4. build     — docker buildx for backend + ai (smoke verifies the
#                  resulting image can start)
#
# Triggers: push to main, PR, manual workflow_dispatch.
#
# The Vedadb engine is not required in CI — the tests use minimal HTTP
# harnesses that don't hit VBP. To run the full integration tests against
# a real engine, run them locally with `docker compose up edadb` first.

name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (syntax)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Node syntax check (all backend .mjs)
        working-directory: backend
        run: |
          set -e
          for f in $(find lib scripts -name '*.mjs') server.mjs; do
            node --check "$f"
          done
      - name: Python syntax check (all ai .py)
        working-directory: ai
        run: |
          set -e
          python -c "
          import ast, sys
          bad = 0
          for f in __import__('pathlib').Path('service').rglob('*.py'):
              try:
                  ast.parse(f.read_text(encoding='utf-8'))
              except SyntaxError as e:
                  print(f'SYNTAX: {f}: {e}')
                  bad += 1
          sys.exit(bad)
          "
      - name: Backend dep install (for syntax check imports)
        working-directory: backend
        run: npm ci --no-audit --no-fund

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install deps
        working-directory: backend
        run: npm ci --no-audit --no-fund
      - name: Run all .mjs tests (dep-free, no Vedadb)
        run: |
          set -e
          for f in tests/test-security.mjs; do
            echo "→ $f"
            node "$f"
          done
      - name: Boot server on random port, smoke-test prod endpoints
        env:
          PORT: '3010'
          NODE_ENV: development
          AI_SERVICE_KEY: ci-only-test-key
        run: |
          set -e
          cd backend
          (node server.mjs > /tmp/server.log 2>&1 &) ; SERVER_PID=$!
          sleep 3
          echo "--- /api/health ---" ; curl -fsS http://127.0.0.1:3010/api/health
          echo "--- /readyz ---"      ; curl -fsS http://127.0.0.1:3010/readyz
          echo "--- /metrics (head) ---"
          curl -fsS http://127.0.0.1:3010/metrics | head -20
          echo "--- send SIGTERM, expect graceful shutdown ---"
          pkill -TERM -f "node server.mjs"
          sleep 2
          # Confirm we logged the shutdown event in JSON
          grep -q shutdown_complete /tmp/server.log && echo "graceful_shutdown=OK" || (echo "FAIL: no shutdown_complete in log"; exit 1)
      - name: Verify PHI logger integration on patient routes
        run: |
          set -e
          # Static check: patient GET routes call markPhiAccess.
          grep -nE "markPhiAccess\(req" backend/server.mjs | head -10

  security:
    name: Security audit
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: npm audit (fail on high+)
        working-directory: backend
        run: |
          npm ci --no-audit --no-fund
          npm audit --audit-level=high || (echo "::error::npm audit found high+ vulnerabilities"; exit 1)
      - name: Secret scan (gitleaks-light)
        run: |
          # Quick-and-dirty: grep for likely hardcoded secrets.
          ! grep -rEn "(AKIA[0-9A-Z]{16}|-----BEGIN [A-Z ]+ PRIVATE KEY-----|ghp_[0-9a-zA-Z]{36}|sk-[0-9a-zA-Z]{20,})" backend ai || (echo "::error::Possible secret in source"; exit 1)
          echo "secret_scan=clean"

  build:
    name: Docker build (smoke)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build backend image
        run: docker build -t tatvacare-backend:ci -f backend/Dockerfile .
      - name: Build AI image
        run: docker build -t tatvacare-ai:ci -f ai/Dockerfile .
      # Note: a full `docker compose up` requires the Vedadb engine image
      # which isn't part of this repo. To smoke-test the full stack in CI,
      # add a `docker compose config` step once tiennesdm/edadb is published.
